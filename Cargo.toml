[package]
name = "psflow"
version = "0.1.0"
edition = "2021"
description = "Domain-agnostic process flow control and execution framework"

[dependencies]
clap = { version = "4.6.0", features = ["derive"] }
futures = "0.3.32"
petgraph = "0.6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["full"] }

[dev-dependencies]
pretty_assertions = "1"
proptest = "1"
